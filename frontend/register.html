<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejestracja - Łódź News</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
  <div class="auth-container">
    <h2>Zarejestruj się</h2>
    <form id="register-form">
      <div class="form-group">
        <label>Nazwa użytkownika</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Hasło</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn-primary">Zarejestruj</button>
      <div id="message" style="margin-top: 15px; text-align: center; display: none;"></div>
    </form>
    <p>Masz już konto? <a href="login.html">Zaloguj się</a></p>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const messageEl = document.getElementById('message');
      const btn = e.target.querySelector('button');
      
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        btn.disabled = true;
        btn.textContent = 'Rejestracja...';
        
        const success = await register(username, email, password);
        
        if (success) {
          messageEl.style.display = 'block';
          messageEl.style.color = 'green';
          messageEl.textContent = 'Rejestracja pomyślna! Przekierowanie...';
          setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
          messageEl.style.display = 'block';
          messageEl.style.color = 'red';
          messageEl.textContent = 'Błąd rejestracji. Spróbuj ponownie.';
          btn.disabled = false;
          btn.textContent = 'Zarejestruj';
        }
      } catch (err) {
        messageEl.style.display = 'block';
        messageEl.style.color = 'red';
        messageEl.textContent = 'Błąd: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Zarejestruj';
      }
    });
  </script>
</body>
</html>
