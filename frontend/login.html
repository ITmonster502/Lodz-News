<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie - Łódź News</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
  <div class="auth-container">
    <h2>Zaloguj się</h2>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Hasło</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn-primary">Zaloguj</button>
    </form>
    <p>Nie masz konta? <a href="register.html">Zarejestruj się</a></p>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const success = await login(email, password);
      if (success) window.location.href = 'index.html';
    });
  </script>
</body>
</html>
