<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Łódź News - Najważniejsze wiadomości z Twojego miasta</title>
  <meta name="description" content="Najświeższe informacje z Łodzi. Codzienne aktualności, sport, kultura i biznes w jednym miejscu.">
  <meta property="og:title" content="Łódź News - Portal Twojego Miasta">
  <meta property="og:description" content="Portal informacyjny miasta Łódź. Najważniejsze wydarzenia w zasięgu ręki.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/assets/placeholder.svg">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
  <header>
    <div class="top-bar">
      <div id="weather-widget">
        <span id="lodz-time"></span> | 
        <span id="lodz-date"></span> | 
        <span id="lodz-weather">Загрузка погоды...</span>
      </div>
      <div class="top-bar-right">
        <div id="auth-links">
          <a href="login.html" style="text-decoration: none; color: inherit; font-weight: 700;">Account</a>
        </div>
      </div>
    </div>
    <div class="header-main">
      <div class="logo">
        <h1>Łódź News</h1>
      </div>
      <nav>
        <ul id="category-nav">
          <li><a href="index.html">Home</a></li>
          <!-- Categories will be loaded dynamically -->
        </ul>
      </nav>
    </div>
    <div class="controls">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search...">
      </div>
      <select id="language-switcher">
        <option value="pl">PL</option>
        <option value="en">EN</option>
        <option value="ru">RU</option>
      </select>
      <button id="theme-toggle" class="btn-toggle">🌙</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div id="hero-section">
        <!-- Hero content loaded dynamically -->
      </div>
      <div class="trending-sidebar">
        <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">🔥 Trending</h2>
        <div id="trending-list">
          <!-- Trending articles loaded dynamically -->
        </div>
      </div>
    </section>

    <section class="latest-news">
      <h2 class="section-title">Najnowsze Wiadomości</h2>
      <div class="news-grid" id="articles-grid">
        <!-- Articles loaded dynamically -->
      </div>
    </section>

    <section class="site-info" id="site-info">
      <h2 class="section-title" id="site-info-title">O serwisie</h2>
      <div class="site-info-grid">
        <div class="site-info-card">
          <div class="site-info-kicker" id="site-info-kicker">Łódź w jednym miejscu</div>
          <div class="site-info-content" id="site-info-content"></div>
        </div>
        <div class="site-info-card">
          <div class="site-info-kicker" id="site-info-features-title">Co znajdziesz</div>
          <ul class="site-info-list" id="site-info-features"></ul>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-bottom">
        <p>&copy; 2026 Łódź News. Wszelkie prawa zastrzeżone.</p>
        <div class="social-links">
          <a href="#" class="social-link facebook" title="Facebook">
            <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
          </a>
          <a href="#" class="social-link twitter" title="Twitter">
            <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>
          </a>
          <a href="#" class="social-link instagram" title="Instagram">
            <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/api.js?v=10"></script>
  <script src="js/auth.js?v=10"></script>
  <script src="js/main.js?v=10"></script>
</body>
</html>
